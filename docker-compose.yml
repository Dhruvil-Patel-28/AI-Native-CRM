services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: glowstudio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── CRM Backend ─────────────────────────────────────────
  crm-backend:
    build: ./crm-backend
    ports:
      - "8000:8000"
    env_file:
      - ./crm-backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/glowstudio
      CHANNEL_STUB_URL: http://channel-stub:8001
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Channel Stub ────────────────────────────────────────
  channel-stub:
    build: ./channel-stub
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"

  # ─── React Frontend ──────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - crm-backend

volumes:
  pgdata:
